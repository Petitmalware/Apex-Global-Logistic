global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: apex-app
    metrics_path: /api/metrics
    static_configs:
      - targets:
          - app:3000

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080
