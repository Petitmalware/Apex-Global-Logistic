name: apex-global-logistics

x-logging: &default-logging
  driver: json-file
  options:
    max-file: "5"
    max-size: "10m"

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
        DATABASE_URL: ${DATABASE_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../.env.production
    environment:
      APP_ENV: production
      NODE_ENV: production
      PORT: 3000
    logging: *default-logging
    networks:
      - apex_private
    ports:
      - "127.0.0.1:${APP_PORT:-3000}:3000"
    restart: unless-stopped
    volumes:
      - ../storage:/app/storage

  migrate:
    build:
      context: ..
      dockerfile: Dockerfile
      target: migrator
      args:
        AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
        DATABASE_URL: ${DATABASE_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../.env.production
    logging: *default-logging
    networks:
      - apex_private
    restart: "no"

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-apex_global_logistics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER:-apex}
    healthcheck:
      interval: 10s
      retries: 6
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-apex} -d ${POSTGRES_DB:-apex_global_logistics}",
        ]
      timeout: 5s
    logging: *default-logging
    networks:
      - apex_private
    restart: unless-stopped
    shm_size: 256mb
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    healthcheck:
      interval: 10s
      retries: 6
      test: ["CMD", "redis-cli", "ping"]
      timeout: 5s
    logging: *default-logging
    networks:
      - apex_private
    restart: unless-stopped
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
    healthcheck:
      interval: 10s
      retries: 6
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live || exit 1"]
      timeout: 5s
    logging: *default-logging
    networks:
      - apex_private
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    restart: unless-stopped
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "local/$${S3_BUCKET}"
        mc anonymous set none "local/$${S3_BUCKET}"
    env_file:
      - ../.env.production
    logging: *default-logging
    networks:
      - apex_private
    restart: "no"

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    logging: *default-logging
    networks:
      - apex_private
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    profiles:
      - monitoring
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  node-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - --path.rootfs=/host
    logging: *default-logging
    networks:
      - apex_private
    pid: host
    profiles:
      - monitoring
    restart: unless-stopped
    volumes:
      - /:/host:ro,rslave

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    logging: *default-logging
    networks:
      - apex_private
    privileged: true
    profiles:
      - monitoring
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

  grafana:
    image: grafana/grafana:11.3.1
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://127.0.0.1:3001}
    logging: *default-logging
    networks:
      - apex_private
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3001}:3000"
    profiles:
      - monitoring
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana

networks:
  apex_private:
    driver: bridge

volumes:
  grafana_data:
  minio_data:
  postgres_data:
  prometheus_data:
  redis_data:
