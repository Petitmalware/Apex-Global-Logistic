services:
  app:
    build:
      context: .
      args:
        DATABASE_URL: postgresql://apex:apex_password@postgres:5432/apex_global_logistics?schema=public
        NEXT_PUBLIC_APP_URL: http://localhost:3000
        AUTH_JWT_SECRET: docker-development-secret-change-before-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: production
      AUTH_JWT_SECRET: docker-development-secret-change-before-production
      DATABASE_URL: postgresql://apex:apex_password@postgres:5432/apex_global_logistics?schema=public
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: apex_global_logistics
      POSTGRES_PASSWORD: apex_password
      POSTGRES_USER: apex
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apex -d apex_global_logistics"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
