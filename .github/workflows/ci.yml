name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      APP_ENV: test
      AUTH_JWT_SECRET: ci-auth-secret-with-at-least-thirty-two-characters
      DATABASE_URL: postgresql://apex:apex_password@localhost:5432/apex_global_logistics?schema=public
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      REDIS_URL: redis://localhost:6379
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: apex_global_logistics
          POSTGRES_PASSWORD: apex_password
          POSTGRES_USER: apex
        options: >-
          --health-cmd "pg_isready -U apex -d apex_global_logistics"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version-file: .node-version

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npm run db:validate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format
        run: npm run format

      - name: Build
        run: npm run build
